name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check

  opencode-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Typecheck
        run: |
          set -o pipefail
          bun run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-plugin-typecheck
          path: opencode-plugin/typecheck.log
      - run: bun test
      - run: bun run build

  gnome-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gnome-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: glib-compile-schemas --strict --dry-run schemas
